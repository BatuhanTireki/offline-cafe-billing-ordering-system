<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masa Detay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .back-btn:hover {
            background: #5568d3;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .product-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .product-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 600;
        }

        .orders-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .order-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-info {
            flex: 1;
        }

        .order-name {
            font-weight: bold;
            font-size: 16px;
            color: #2d3748;
        }

        .order-price {
            color: #667eea;
            font-size: 14px;
            margin-top: 5px;
        }

        .order-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .qty-btn:hover {
            background: #5568d3;
        }

        .qty-btn.delete {
            background: #fc8181;
        }

        .qty-btn.delete:hover {
            background: #f56565;
        }

        .qty-display {
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .total-section {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .total-label {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 36px;
            font-weight: bold;
        }

        .payment-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .pay-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
        }

        .pay-btn.cash {
            background: #48bb78;
        }

        .pay-btn.card {
            background: #4299e1;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .category-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .category-btn.active {
            background: #667eea;
            color: white;
        }

        .empty-message {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 id="tableTitle">Masa 1</h1>
            <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                <input type="text" id="tableNote" placeholder="Masa notu" style="padding:8px;border:2px solid #e2e8f0;border-radius:8px;min-width:200px;">
                <button class="back-btn" type="button" style="padding:8px 14px;font-size:13px;" onclick="saveNote()">Not Kaydet</button>
                <button class="back-btn" type="button" style="padding:8px 14px;font-size:13px;background:#ed8936;" onclick="openTransferModal()">Masa Transfer</button>
            </div>
        </div>
        <button class="back-btn" onclick="goBack()">← Geri Dön</button>
    </div>

    <div id="transferModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:white;padding:24px;border-radius:12px;min-width:300px;">
            <h3 style="margin-bottom:12px;color:#667eea;">Masa Transfer</h3>
            <label>Hedef masa numarasi</label>
            <input type="number" id="transferTarget" min="1" max="40" style="width:100%;margin:8px 0 16px;padding:10px;border:2px solid #e2e8f0;border-radius:8px;">
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button class="back-btn" type="button" style="background:#718096;" onclick="closeTransferModal()">Iptal</button>
                <button class="back-btn" type="button" onclick="confirmTransfer()">Transfer Et</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- Sol Panel: Ürünler -->
        <div class="panel">
            <h2>🍽️ Menü</h2>
            <div class="category-filter" id="categoryFilter"></div>
            <input type="text" id="productSearch" placeholder="🔍 Ürün ara..." 
                   oninput="filterAndRenderProducts()" 
                   style="width:100%; padding:10px; margin-bottom:12px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px;">
            <div class="products-grid" id="productsGrid">
                <div class="empty-message">Ürünler yükleniyor...</div>
            </div>
        </div>

        <!-- Sağ Panel: Adisyon -->
        <div class="panel">
            <h2>🧾 Adisyon</h2>
            <div class="orders-list" id="ordersList">
                <div class="empty-message">Sipariş bulunmuyor</div>
            </div>

            <div class="total-section">
                <div class="total-label">TOPLAM TUTAR</div>
                <div class="total-amount" id="totalAmount">0.00 ₺</div>
            </div>

            <div class="payment-buttons">
                <button class="pay-btn cash" onclick="closeTable('cash')">💵 Nakit Ödeme</button>
                <button class="pay-btn card" onclick="closeTable('card')">💳 Kart Ödeme</button>
            </div>
        </div>
    </div>

    <script>
        // Fiyat güvenli gösterimi - null/undefined hatalarını önler
        function formatPrice(val) {
            const n = (val == null || val === '' || isNaN(val)) ? 0 : Number(val);
            return n.toFixed(2) + ' ₺';
        }

        let API_URL = 'http://127.0.0.1:5000/api';
        let tableId = null;
        let currentTable = null;
        let products = [];
        let selectedCategory = 'all';
        let backendReady = false;
        let initialized = false;
        let currentUser = null;

        function getAuth() {
            return JSON.parse(localStorage.getItem('auth') || 'null');
        }

        function requireAuth() {
            const auth = getAuth();
            if (!auth || !auth.token || !auth.user) {
                window.location.href = 'login.html';
                return false;
            }
            currentUser = auth.user;
            return true;
        }

        function canCloseTable() {
            if (currentUser?.role === 'admin') return true;
            const auth = getAuth();
            return auth?.settings?.waiter_can_close === true;
        }

        function applyPaymentVisibility() {
            const el = document.querySelector('.payment-buttons');
            if (el) el.style.display = canCloseTable() ? 'flex' : 'none';
        }

        function authHeaders(extra = {}) {
            const auth = getAuth();
            return Object.assign({}, extra, {
                'Authorization': `Bearer ${auth.token}`
            });
        }

        async function authFetch(url, options = {}) {
            const merged = Object.assign({}, options);
            merged.headers = authHeaders(options.headers || {});
            const response = await fetch(url, merged);
            if (response.status === 401) {
                localStorage.removeItem('auth');
                window.location.href = 'login.html';
            }
            return response;
        }

        // URL'den masa ID'sini al
        const urlParams = new URLSearchParams(window.location.search);
        tableId = urlParams.get('id');
        if (!tableId) {
            window.location.replace('index.html');
        }

        // Backend hazır olduğunda
        window.electronAPI.onBackendReady(async (data) => {
            if (!requireAuth()) return;
            if (initialized) return;
            API_URL = `http://127.0.0.1:${data.port}/api`;
            backendReady = true;
            initialized = true;
            applyPaymentVisibility();
            await init();
        });

        window.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;
            if (initialized) return;
            try {
                const port = await window.electronAPI.getBackendPort();
                API_URL = `http://127.0.0.1:${port}/api`;
                backendReady = true;
                initialized = true;
                applyPaymentVisibility();
                await init();
            } catch (error) {
                console.log('Backend henüz hazır değil, bekleniyor...');
            }
        });

        async function init() {
            if (!backendReady) {
                setTimeout(init, 1000);
                return;
            }
            await loadProducts();
            await loadTableInfo();
            await loadOrders();
            setInterval(loadOrders, 3000); // Her 3 saniyede bir siparişleri güncelle
        }

        // Ürünleri yükle
        async function loadProducts() {
            try {
                const response = await authFetch(`${API_URL}/menu/products`);
                const data = await response.json();
                
                if (data.success) {
                    products = data.data;
                    renderCategoryFilter();
                    renderProducts();
                }
            } catch (error) {
                console.error('Ürünler yüklenemedi:', error);
            }
        }

        // Kategori filtresini render et
        function renderCategoryFilter() {
            const categories = ['all', ...new Set(products.map(p => p.category_name).filter(Boolean))];
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = '';

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `category-btn ${cat === selectedCategory ? 'active' : ''}`;
                btn.textContent = cat === 'all' ? 'Tümü' : cat;
                btn.addEventListener('click', () => filterByCategory(cat));
                filter.appendChild(btn);
            });
        }

        // Kategori filtrele
        function filterByCategory(category) {
            selectedCategory = category;
            renderCategoryFilter();
            renderProducts();
        }

        let productSearchTerm = '';

        function filterAndRenderProducts() {
            productSearchTerm = (document.getElementById('productSearch')?.value || '').toLowerCase().trim();
            renderProducts();
        }

        // Ürünleri render et
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            let filtered = selectedCategory === 'all' 
                ? products 
                : products.filter(p => p.category_name === selectedCategory);
            if (productSearchTerm) {
                filtered = filtered.filter(p => 
                    (p.name || '').toLowerCase().includes(productSearchTerm) ||
                    (p.category_name || '').toLowerCase().includes(productSearchTerm));
            }

            grid.innerHTML = filtered.length === 0 
                ? '<div class="empty-message">' + (productSearchTerm ? 'Arama sonucu bulunamadı' : 'Ürün bulunmuyor') + '</div>'
                : filtered.map(product => `
                <div class="product-card" onclick="addProduct(${product.id})">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">${formatPrice(product.price)}</div>
                </div>
            `).join('');
        }

        // Masa bilgisini yükle
        async function loadTableInfo() {
            try {
                const response = await authFetch(`${API_URL}/tables/${tableId}`);
                const data = await response.json();
                
                if (data.success) {
                    currentTable = data.data;
                    let title = `Masa ${currentTable.table_number}`;
                    if (currentTable.note) title += ` — ${currentTable.note}`;
                    document.getElementById('tableTitle').textContent = title;
                    const noteEl = document.getElementById('tableNote');
                    if (noteEl) noteEl.value = currentTable.note || '';
                    updateTotal();
                }
            } catch (error) {
                console.error('Masa bilgisi yüklenemedi:', error);
            }
        }

        // Siparişleri yükle
        async function loadOrders() {
            try {
                const response = await authFetch(`${API_URL}/orders/table/${tableId}`);
                const data = await response.json();
                
                if (data.success) {
                    renderOrders(data.data);
                }
                
                // Masa toplamını güncelle
                await loadTableInfo();
            } catch (error) {
                console.error('Siparişler yüklenemedi:', error);
            }
        }

        // Siparişleri render et
        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                list.innerHTML = '<div class="empty-message">Sipariş bulunmuyor</div>';
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div class="order-info">
                        <div class="order-name">${order.product_name}</div>
                        <div class="order-price">${formatPrice(order.unit_price)} x ${order.quantity} = ${formatPrice(order.total_price)}</div>
                    </div>
                    <div class="order-controls">
                        <button class="qty-btn" onclick="decreaseQuantity(${order.id}, ${order.quantity})">-</button>
                        <div class="qty-display">${order.quantity}</div>
                        <button class="qty-btn" onclick="increaseQuantity(${order.id}, ${order.quantity})">+</button>
                        <button class="qty-btn delete" onclick="deleteOrder(${order.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Toplam tutarı güncelle
        function updateTotal() {
            const total = currentTable ? currentTable.total_amount : 0;
            document.getElementById('totalAmount').textContent = formatPrice(total);
        }

        // Ürün ekle
        async function addProduct(productId) {
            try {
                const response = await authFetch(`${API_URL}/orders/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        table_id: tableId,
                        product_id: productId,
                        quantity: 1
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadOrders();
                } else {
                    alert(data.error || 'Ürün eklenemedi');
                }
            } catch (error) {
                console.error('Ürün eklenemedi:', error);
                alert('Bağlantı hatası. Lütfen tekrar deneyin.');
            }
        }

        // Adet artır
        async function increaseQuantity(orderId, currentQty) {
            await updateQuantity(orderId, currentQty + 1);
        }

        // Adet azalt
        async function decreaseQuantity(orderId, currentQty) {
            if (currentQty > 1) {
                await updateQuantity(orderId, currentQty - 1);
            }
        }

        // Adet güncelle
        async function updateQuantity(orderId, newQty) {
            try {
                const response = await authFetch(`${API_URL}/orders/${orderId}/quantity`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQty })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadOrders();
                } else {
                    alert(data.error || 'Adet güncellenemedi');
                }
            } catch (error) {
                console.error('Adet güncellenemedi:', error);
            }
        }

        // Sipariş sil
        async function deleteOrder(orderId) {
            if (!confirm('Bu ürünü adisyondan silmek istediğinize emin misiniz?')) {
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/orders/${orderId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadOrders();
                }
            } catch (error) {
                console.error('Sipariş silinemedi:', error);
            }
        }

        // Masayı kapat
        async function saveNote() {
            try {
                const note = document.getElementById('tableNote').value;
                const res = await authFetch(`${API_URL}/tables/${tableId}/note`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note })
                });
                const data = await res.json();
                if (data.success) {
                    await loadTableInfo();
                    alert('Not kaydedildi');
                }
            } catch (e) {
                alert('Not kaydedilemedi');
            }
        }

        function openTransferModal() {
            document.getElementById('transferModal').style.display = 'flex';
        }

        function closeTransferModal() {
            document.getElementById('transferModal').style.display = 'none';
        }

        async function confirmTransfer() {
            const num = parseInt(document.getElementById('transferTarget').value, 10);
            if (!num) { alert('Masa numarasi girin'); return; }
            try {
                const tablesRes = await authFetch(`${API_URL}/tables/`);
                const tablesData = await tablesRes.json();
                const target = (tablesData.data || []).find(t => t.table_number === num);
                if (!target) { alert('Masa bulunamadi'); return; }
                const res = await authFetch(`${API_URL}/tables/${tableId}/transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target_table_id: target.id })
                });
                const data = await res.json();
                if (data.success) {
                    closeTransferModal();
                    alert('Transfer tamamlandi');
                    goBack();
                } else {
                    alert(data.error || 'Transfer basarisiz');
                }
            } catch (e) {
                alert('Baglanti hatasi');
            }
        }

        async function closeTable(paymentMethod) {
            if (!canCloseTable()) {
                alert('Odeme alma yetkiniz yok. Admin ayarlardan garson yetkisini acabilir.');
                return;
            }
            if (!currentTable || currentTable.total_amount === 0) {
                alert('Adisyonda ürün bulunmuyor!');
                return;
            }

            const methodText = paymentMethod === 'cash' ? 'Nakit' : 'Kart';
            if (!confirm(`${formatPrice(currentTable.total_amount)} ${methodText} ödeme alınacak. Onaylıyor musunuz?`)) {
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/tables/${tableId}/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payment_method: paymentMethod })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Ödeme alındı! Masa kapatıldı.');
                    goBack();
                } else {
                    alert(data.error || 'Masa kapatılamadı.');
                }
            } catch (error) {
                console.error('Masa kapatılamadı:', error);
                alert('Bağlantı hatası. Masa kapatılamadı.');
            }
        }

        // Ana sayfaya dön
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
