<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satış Geçmişi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .filter-group {
            flex: 1;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .sales-list {
            margin-top: 20px;
        }

        .sale-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sale-card:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .sale-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .sale-date {
            font-size: 14px;
            color: #718096;
        }

        .sale-amount {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .sale-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .sale-detail-item {
            font-size: 14px;
            color: #4a5568;
        }

        .sale-detail-label {
            font-weight: 600;
            display: block;
            color: #2d3748;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: #fc8181;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .products-table th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
        }

        .products-table td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-size: 16px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📜 Satış Geçmişi</h1>
        <button class="back-btn" onclick="goBack()">← Geri Dön</button>
    </div>

    <div class="container">
        <!-- Filtreler -->
        <div class="filters">
            <div class="filter-group">
                <label>Başlangıç Tarihi</label>
                <input type="date" id="startDate">
            </div>
            <div class="filter-group">
                <label>Bitiş Tarihi</label>
                <input type="date" id="endDate">
            </div>
            <div class="filter-group" style="display: flex; align-items: flex-end;">
                <button class="btn btn-primary" onclick="loadSales()" style="width: 100%;">
                    🔍 Ara
                </button>
            </div>
        </div>

        <!-- Özet İstatistikler -->
        <div class="summary-stats" id="summaryStats" style="display: none;">
            <div class="stat-card">
                <div class="stat-label">Toplam Satış</div>
                <div class="stat-value" id="totalSalesCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Toplam Ciro</div>
                <div class="stat-value" id="totalRevenue">0 ₺</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ortalama Adisyon</div>
                <div class="stat-value" id="avgSale">0 ₺</div>
            </div>
        </div>

        <!-- Satış Listesi -->
        <div class="sales-list" id="salesList">
            <div class="empty-message">Tarih seçin ve ara butonuna tıklayın</div>
        </div>
    </div>

    <!-- Detay Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Satış Detayı</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        function formatPrice(val) {
            const n = (val == null || val === '' || isNaN(val)) ? 0 : Number(val);
            return n.toFixed(2) + ' ₺';
        }

        let API_URL = 'http://127.0.0.1:5000/api';
        let backendReady = false;
        let initialized = false;

        function getAuth() {
            return JSON.parse(localStorage.getItem('auth') || 'null');
        }

        function requireAdmin() {
            const auth = getAuth();
            if (!auth || !auth.token || !auth.user) {
                window.location.href = 'login.html';
                return false;
            }
            if (auth.user.role !== 'admin') {
                alert('Bu sayfa sadece admin kullanıcılar içindir.');
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        function authHeaders(extra = {}) {
            const auth = getAuth();
            return Object.assign({}, extra, {
                'Authorization': `Bearer ${auth.token}`
            });
        }

        async function authFetch(url, options = {}) {
            const merged = Object.assign({}, options);
            merged.headers = authHeaders(options.headers || {});
            const response = await fetch(url, merged);
            if (response.status === 401) {
                localStorage.removeItem('auth');
                window.location.href = 'login.html';
            }
            if (response.status === 403) {
                alert('Bu işlem için admin yetkisi gerekli.');
                window.location.href = 'index.html';
            }
            return response;
        }

        window.electronAPI.onBackendReady(async (data) => {
            if (!requireAdmin()) return;
            if (initialized) return;
            API_URL = `http://127.0.0.1:${data.port}/api`;
            backendReady = true;
            initialized = true;
            init();
        });

        window.addEventListener('DOMContentLoaded', async () => {
            if (!requireAdmin()) return;
            if (initialized) return;
            try {
                const port = await window.electronAPI.getBackendPort();
                API_URL = `http://127.0.0.1:${port}/api`;
                backendReady = true;
                initialized = true;
                init();
            } catch (error) {
                console.log('Backend henüz hazır değil, bekleniyor...');
            }
        });

        function init() {
            // Son 7 günü default olarak ayarla
            const today = new Date();
            const lastWeek = new Date(today);
            lastWeek.setDate(lastWeek.getDate() - 7);

            document.getElementById('startDate').value = formatDate(lastWeek);
            document.getElementById('endDate').value = formatDate(today);

            // Otomatik yükle
            loadSales();
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        async function loadSales() {
            if (!backendReady) {
                setTimeout(loadSales, 1000);
                return;
            }

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                alert('Lütfen tarih aralığı seçin!');
                return;
            }

            try {
                // Satışları çek
                const response = await authFetch(`${API_URL}/sales/history?start_date=${startDate}&end_date=${endDate}`);
                const data = await response.json();

                if (data.success) {
                    renderSales(data.data);
                    updateSummary(data.data);
                }
            } catch (error) {
                console.error('Satışlar yüklenemedi:', error);
            }
        }

        function updateSummary(sales) {
            if (sales.length === 0) {
                document.getElementById('summaryStats').style.display = 'none';
                return;
            }

            document.getElementById('summaryStats').style.display = 'grid';
            
            const totalSales = sales.length;
            const totalRevenue = sales.reduce((sum, sale) => sum + sale.total_amount, 0);
            const avgSale = totalRevenue / totalSales;

            document.getElementById('totalSalesCount').textContent = totalSales;
            document.getElementById('totalRevenue').textContent = formatPrice(totalRevenue);
            document.getElementById('avgSale').textContent = formatPrice(avgSale);
        }

        function renderSales(sales) {
            const list = document.getElementById('salesList');

            if (sales.length === 0) {
                list.innerHTML = '<div class="empty-message">Bu tarih aralığında satış bulunmuyor</div>';
                return;
            }

            list.innerHTML = sales.map(sale => {
                const saleDate = new Date(sale.sale_date);
                const openedDate = new Date(sale.opened_at);
                const closedDate = new Date(sale.closed_at);
                const duration = Math.round((closedDate - openedDate) / 1000 / 60); // dakika

                return `
                    <div class="sale-card" onclick="showDetail(${sale.id})">
                        <div class="sale-header">
                            <div>
                                <strong>Masa ${sale.table_number}</strong>
                                <div class="sale-date">${formatDateTime(saleDate)}</div>
                            </div>
                            <div class="sale-amount">${formatPrice(sale.total_amount)}</div>
                        </div>
                        <div class="sale-details">
                            <div class="sale-detail-item">
                                <span class="sale-detail-label">Ödeme</span>
                                ${sale.payment_method === 'cash' ? '💵 Nakit' : '💳 Kart'}
                            </div>
                            <div class="sale-detail-item">
                                <span class="sale-detail-label">Açılış</span>
                                ${formatTime(openedDate)}
                            </div>
                            <div class="sale-detail-item">
                                <span class="sale-detail-label">Kapanış</span>
                                ${formatTime(closedDate)}
                            </div>
                            <div class="sale-detail-item">
                                <span class="sale-detail-label">Süre</span>
                                ${duration} dakika
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function showDetail(saleId) {
            try {
                const response = await authFetch(`${API_URL}/sales/${saleId}/details`);
                const data = await response.json();

                if (data.success) {
                    const sale = data.data;
                    const modal = document.getElementById('detailModal');
                    const content = document.getElementById('modalContent');

                    content.innerHTML = `
                        <div style="margin-bottom: 20px;">
                            <h3>Masa ${sale.table_number}</h3>
                            <p><strong>Tarih:</strong> ${formatDateTime(new Date(sale.sale_date))}</p>
                            <p><strong>Ödeme:</strong> ${sale.payment_method === 'cash' ? '💵 Nakit' : '💳 Kart'}</p>
                            <p><strong>Toplam:</strong> ${formatPrice(sale.total_amount)}</p>
                        </div>

                        <h4>Sipariş Detayları</h4>
                        <table class="products-table">
                            <thead>
                                <tr>
                                    <th>Ürün</th>
                                    <th>Kategori</th>
                                    <th>Adet</th>
                                    <th>Birim Fiyat</th>
                                    <th>Toplam</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sale.details.map(item => `
                                    <tr>
                                        <td>${item.product_name}</td>
                                        <td>${item.category_name || '-'}</td>
                                        <td>${item.quantity}</td>
                                        <td>${formatPrice(item.unit_price)}</td>
                                        <td><strong>${formatPrice(item.total_price)}</strong></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;

                    modal.classList.add('active');
                }
            } catch (error) {
                console.error('Detay yüklenemedi:', error);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function formatDateTime(date) {
            return date.toLocaleString('tr-TR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatTime(date) {
            return date.toLocaleTimeString('tr-TR', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Modal dışı tıklamada kapat
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
