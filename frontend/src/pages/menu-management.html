<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menü Yönetimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .add-form {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2d3748;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
        }
        
        .form-group input:disabled,
        .form-group select:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 100px;
            gap: 15px;
            align-items: end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
        }

        .products-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .products-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .products-table tr:hover {
            background: #f7fafc;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }

        .btn-edit {
            background: #4299e1;
            color: white;
        }

        .btn-delete {
            background: #fc8181;
            color: white;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .modal-overlay.active { 
            display: flex; 
            pointer-events: auto;
        }
        .modal-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            min-width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin-bottom: 20px; color: #667eea; }
        .modal-box .form-group { margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions .btn { min-width: 80px; }
        .btn-secondary { background: #718096; color: white; }
        .btn-secondary:hover { background: #4a5568; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Menü Yönetimi</h1>
        <button class="back-btn" onclick="goBack()">← Geri Dön</button>
    </div>

    <div class="container">
        <!-- Yeni Ürün Ekleme -->
        <div class="section">
            <h2>➕ Yeni Ürün Ekle</h2>
            <div class="add-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Ürün Adı</label>
                        <input type="text" id="productName" placeholder="Örn: Cappuccino">
                    </div>
                    <div class="form-group">
                        <label>Fiyat (₺)</label>
                        <input type="number" id="productPrice" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="productCategory"></select>
                    </div>
                    <button class="btn btn-primary" onclick="addProduct()">Ekle</button>
                </div>
            </div>
        </div>

        <!-- Ürün Listesi -->
        <div class="section">
            <h2>📦 Mevcut Ürünler</h2>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="productSearch" placeholder="🔍 Ürün ara..." 
                       oninput="filterProducts()" style="max-width: 300px;">
            </div>
            <table class="products-table">
                <thead>
                    <tr>
                        <th>Ürün Adı</th>
                        <th>Kategori</th>
                        <th>Fiyat</th>
                        <th>İşlemler</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center;">Yükleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Ürün Düzenleme Modal -->
    <div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEditModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3>✏️ Ürün Düzenle</h3>
            <div class="form-group">
                <label>Ürün Adı</label>
                <input type="text" id="editProductName" placeholder="Ürün adı">
            </div>
            <div class="form-group">
                <label>Fiyat (₺)</label>
                <input type="number" id="editProductPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="editProductCategory"></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">İptal</button>
                <button class="btn btn-primary" onclick="saveEditedProduct()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        function formatPrice(val) {
            const n = (val == null || val === '' || isNaN(val)) ? 0 : Number(val);
            return n.toFixed(2) + ' ₺';
        }

        let API_URL = 'http://127.0.0.1:5000/api';
        let categories = [];
        let products = [];
        let backendReady = false;
        let initialized = false;
        let currentUser = null;

        function getAuth() {
            return JSON.parse(localStorage.getItem('auth') || 'null');
        }

        function requireAdmin() {
            const auth = getAuth();
            if (!auth || !auth.token || !auth.user) {
                window.location.href = 'login.html';
                return false;
            }
            if (auth.user.role !== 'admin') {
                alert('Bu sayfa sadece admin kullanıcılar içindir.');
                window.location.href = 'index.html';
                return false;
            }
            currentUser = auth.user;
            return true;
        }

        function authHeaders(extra = {}) {
            const auth = getAuth();
            return Object.assign({}, extra, {
                'Authorization': `Bearer ${auth.token}`
            });
        }

        async function authFetch(url, options = {}) {
            const merged = Object.assign({}, options);
            merged.headers = authHeaders(options.headers || {});
            const response = await fetch(url, merged);
            if (response.status === 401) {
                localStorage.removeItem('auth');
                window.location.href = 'login.html';
            }
            if (response.status === 403) {
                alert('Bu işlem için admin yetkisi gerekli.');
                window.location.href = 'index.html';
            }
            return response;
        }

        window.electronAPI.onBackendReady(async (data) => {
            if (!requireAdmin()) return;
            if (initialized) return;
            API_URL = `http://127.0.0.1:${data.port}/api`;
            backendReady = true;
            initialized = true;
            await init();
        });

        window.addEventListener('DOMContentLoaded', async () => {
            if (!requireAdmin()) return;
            if (initialized) return;
            try {
                const port = await window.electronAPI.getBackendPort();
                API_URL = `http://127.0.0.1:${port}/api`;
                backendReady = true;
                initialized = true;
                await init();
            } catch (error) {
                console.log('Backend henüz hazır değil, bekleniyor...');
            }
        });

        async function init() {
            if (!backendReady) {
                setTimeout(init, 1000);
                return;
            }
            await loadCategories();
            await loadProducts();
        }

        // Kategorileri yükle
        async function loadCategories() {
            try {
                const response = await authFetch(`${API_URL}/menu/categories`);
                const data = await response.json();
                
                if (data.success) {
                    categories = data.data;
                    renderCategorySelect();
                }
            } catch (error) {
                console.error('Kategoriler yüklenemedi:', error);
            }
        }

        // Kategori select'i render et
        function renderCategorySelect() {
            const select = document.getElementById('productCategory');
            select.innerHTML = categories.map(cat => 
                `<option value="${cat.id}">${cat.name}</option>`
            ).join('');
        }

        // Ürünleri yükle
        async function loadProducts() {
            try {
                const response = await authFetch(`${API_URL}/menu/products`);
                const data = await response.json();
                
                if (data.success) {
                    products = data.data;
                    renderProducts();
                }
            } catch (error) {
                console.error('Ürünler yüklenemedi:', error);
            }
        }

        let productSearchTerm = '';

        function filterProducts() {
            productSearchTerm = (document.getElementById('productSearch')?.value || '').toLowerCase().trim();
            renderProducts();
        }

        // Ürünleri render et
        function renderProducts() {
            const tbody = document.getElementById('productsTableBody');
            const filtered = productSearchTerm
                ? products.filter(p => 
                    (p.name || '').toLowerCase().includes(productSearchTerm) ||
                    (p.category_name || '').toLowerCase().includes(productSearchTerm))
                : products;
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">' + 
                    (productSearchTerm ? 'Arama sonucu bulunamadı' : 'Ürün bulunmuyor') + '</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(product => `
                <tr>
                    <td><strong>${product.name}</strong></td>
                    <td><span class="category-tag">${product.category_name || 'Kategorisiz'}</span></td>
                    <td><strong>${formatPrice(product.price)}</strong></td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editProduct('${product.id}')">✏️ Düzenle</button>
                        <button class="action-btn btn-delete" onclick="deleteProduct(${product.id})">🗑️ Sil</button>
                    </td>
                </tr>
            `).join('');
        }

        // Yeni ürün ekle
        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const categoryId = document.getElementById('productCategory').value;

            if (!name) {
                alert('Ürün adı gerekli!');
                return;
            }
            if (isNaN(price) || price < 0) {
                alert('Geçerli bir fiyat giriniz (0 veya üzeri)!');
                return;
            }
            if (!categoryId) {
                alert('Kategori seçiniz!');
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        price: price,
                        category_id: categoryId
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert('Ürün başarıyla eklendi!');
                    document.getElementById('productName').value = '';
                    document.getElementById('productPrice').value = '';
                    await loadProducts();
                } else {
                    alert(data.error || 'Ürün eklenemedi');
                }
            } catch (error) {
                console.error('Ürün eklenemedi:', error);
                alert('Bağlantı hatası. Lütfen tekrar deneyin.');
            }
        }

        let editingProductId = null;

        function openEditModal(productId) {
            const product = products.find(p => String(p.id) === String(productId));
            if (!product) {
                alert('Ürün bulunamadı.');
                return;
            }
            editingProductId = product.id;
            document.getElementById('editProductName').value = product.name || '';
            document.getElementById('editProductPrice').value = product.price ?? '';
            const catSelect = document.getElementById('editProductCategory');
            catSelect.innerHTML = categories.map(c => 
                `<option value="${c.id}" ${c.id === product.category_id ? 'selected' : ''}>${c.name}</option>`
            ).join('');
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingProductId = null;
        }

        async function saveEditedProduct() {
            if (!editingProductId) return;
            const name = document.getElementById('editProductName').value.trim();
            const price = parseFloat(document.getElementById('editProductPrice').value);
            const categoryId = document.getElementById('editProductCategory').value;

            if (!name) {
                alert('Ürün adı gerekli!');
                return;
            }
            if (isNaN(price) || price < 0) {
                alert('Geçerli bir fiyat giriniz (0 veya üzeri)!');
                return;
            }
            if (!categoryId) {
                alert('Kategori seçiniz!');
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        price: price,
                        category_id: parseInt(categoryId, 10)
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert('Ürün güncellendi!');
                    closeEditModal();
                    await loadProducts();
                } else {
                    alert(data.error || 'Ürün güncellenemedi');
                }
            } catch (error) {
                console.error('Ürün güncellenemedi:', error);
                alert('Bağlantı hatası. Lütfen tekrar deneyin.');
            }
        }

        function editProduct(productId) {
            openEditModal(productId);
        }

        // Ürün sil
        async function deleteProduct(productId) {
            if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) {
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products/${productId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (data.success) {
                    alert('Ürün silindi!');
                    await loadProducts();
                }
            } catch (error) {
                console.error('Ürün silinemedi:', error);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
