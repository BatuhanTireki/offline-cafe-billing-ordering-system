<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menü Yönetimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .add-form {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #2d3748;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
        }
        
        .form-group input:disabled,
        .form-group select:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 100px;
            gap: 15px;
            align-items: end;
        }

        .form-row-category {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 15px;
            align-items: end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
        }

        .products-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .products-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .products-table tr:hover {
            background: #f7fafc;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }

        .btn-edit {
            background: #4299e1;
            color: white;
        }

        .btn-delete {
            background: #fc8181;
            color: white;
        }

        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 12px;
            font-size: 12px;
        }

        .modal-overlay {
            display: none !important;
            visibility: hidden;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
            align-items: center;
            justify-content: center;
            pointer-events: none !important;
        }
        .modal-overlay.active {
            display: flex !important;
            visibility: visible;
            z-index: 1000;
            pointer-events: auto !important;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #38a169; }
        .toast.error { background: #e53e3e; }
        .modal-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            min-width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin-bottom: 20px; color: #667eea; }
        .modal-box .form-group { margin-bottom: 15px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions .btn { min-width: 80px; }
        .btn-secondary { background: #718096; color: white; }
        .btn-secondary:hover { background: #4a5568; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Menü Yönetimi</h1>
        <button class="back-btn" onclick="goBack()">← Geri Dön</button>
    </div>

    <div class="container">
        <!-- Yeni Kategori Ekleme -->
        <div class="section">
            <h2>📁 Yeni Kategori Ekle</h2>
            <div class="add-form">
                <div class="form-row-category">
                    <div class="form-group">
                        <label>Kategori Adı</label>
                        <input type="text" id="categoryName" placeholder="Örn: Sıcak İçecekler">
                    </div>
                    <button class="btn btn-primary" type="button" onclick="addCategory()">Ekle</button>
                </div>
            </div>
            <div id="categoriesList" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;"></div>
        </div>

        <!-- Yeni Ürün Ekleme -->
        <div class="section">
            <h2>➕ Yeni Ürün Ekle</h2>
            <div class="add-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Ürün Adı</label>
                        <input type="text" id="productName" placeholder="Örn: Cappuccino">
                    </div>
                    <div class="form-group">
                        <label>Fiyat (₺)</label>
                        <input type="number" id="productPrice" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="productCategory"></select>
                    </div>
                    <button class="btn btn-primary" onclick="addProduct()">Ekle</button>
                </div>
            </div>
        </div>

        <!-- Ürün Listesi -->
        <div class="section">
            <h2>📦 Mevcut Ürünler</h2>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="productSearch" placeholder="🔍 Ürün ara..." 
                       autocomplete="off" style="max-width: 300px;">
            </div>
            <table class="products-table">
                <thead>
                    <tr>
                        <th>Ürün Adı</th>
                        <th>Kategori</th>
                        <th>Fiyat</th>
                        <th>İşlemler</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center;">Yükleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Ürün Düzenleme Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <h3>✏️ Ürün Düzenle</h3>
            <div class="form-group">
                <label>Ürün Adı</label>
                <input type="text" id="editProductName" placeholder="Ürün adı">
            </div>
            <div class="form-group">
                <label>Fiyat (₺)</label>
                <input type="number" id="editProductPrice" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="editProductCategory"></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">İptal</button>
                <button class="btn btn-primary" onclick="saveEditedProduct()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        function formatPrice(val) {
            const n = (val == null || val === '' || isNaN(val)) ? 0 : Number(val);
            return n.toFixed(2) + ' ₺';
        }

        let API_URL = 'http://127.0.0.1:5000/api';
        let categories = [];
        let products = [];
        let backendReady = false;
        let currentUser = null;
        let productSearchTerm = '';
        let toastTimer = null;

        function enableAllInputs() {
            document.querySelectorAll('input, select, textarea, button').forEach(el => {
                el.disabled = false;
                el.readOnly = false;
            });
            document.getElementById('editModal')?.classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function getAuth() {
            return JSON.parse(localStorage.getItem('auth') || 'null');
        }

        function requireAdmin() {
            const auth = getAuth();
            if (!auth || !auth.token || !auth.user) {
                window.location.href = 'login.html';
                return false;
            }
            if (auth.user.role !== 'admin') {
                alert('Bu sayfa sadece admin kullanıcılar içindir.');
                window.location.href = 'index.html';
                return false;
            }
            currentUser = auth.user;
            return true;
        }

        function authHeaders(extra = {}) {
            const auth = getAuth();
            return Object.assign({}, extra, {
                'Authorization': `Bearer ${auth.token}`
            });
        }

        async function authFetch(url, options = {}) {
            const merged = Object.assign({}, options);
            merged.headers = authHeaders(options.headers || {});
            const response = await fetch(url, merged);
            if (response.status === 401) {
                localStorage.removeItem('auth');
                window.location.href = 'login.html';
            }
            if (response.status === 403) {
                alert('Bu işlem için admin yetkisi gerekli.');
                window.location.href = 'index.html';
            }
            return response;
        }

        async function connectBackend(port) {
            API_URL = `http://127.0.0.1:${port}/api`;
            const baseUrl = API_URL.replace('/api', '');
            try {
                const resp = await fetch(`${baseUrl}/health`, { signal: AbortSignal.timeout(2000) });
                if (!resp.ok) return false;
            } catch (_) {
                return false;
            }
            backendReady = true;
            return true;
        }

        async function bootstrap() {
            if (!requireAdmin()) return;
            let port = 5000;
            try {
                port = await window.electronAPI.getBackendPort();
            } catch (_) {}
            if (await connectBackend(port)) {
                await init();
                return;
            }
            window.electronAPI.onBackendReady(async (data) => {
                if (await connectBackend(data.port)) {
                    await init();
                }
            });
            let attempts = 0;
            const timer = setInterval(async () => {
                attempts++;
                try {
                    port = await window.electronAPI.getBackendPort();
                } catch (_) {}
                if (await connectBackend(port)) {
                    clearInterval(timer);
                    await init();
                } else if (attempts >= 30) {
                    clearInterval(timer);
                    document.getElementById('productsTableBody').innerHTML =
                        '<tr><td colspan="4" style="text-align:center;color:#c53030;">Sunucuya bağlanılamadı</td></tr>';
                }
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            enableAllInputs();
            const searchInput = document.getElementById('productSearch');
            if (searchInput) {
                searchInput.addEventListener('input', filterProducts);
            }
            document.getElementById('editModal')?.addEventListener('click', (e) => {
                if (e.target.id === 'editModal') closeEditModal();
            });
            bootstrap();
        });

        let dataLoaded = false;

        async function init() {
            if (dataLoaded) return;
            dataLoaded = true;
            await loadCategories();
            await loadProducts();
        }

        function resetDataLoaded() {
            dataLoaded = false;
        }

        async function addCategory() {
            const nameInput = document.getElementById('categoryName');
            const name = nameInput.value.trim();
            if (!name) {
                showToast('Kategori adı gerekli!', 'error');
                nameInput.focus();
                return;
            }
            const addBtn = document.querySelector('.form-row-category .btn-primary');
            try {
                if (addBtn) addBtn.disabled = true;
                const response = await authFetch(`${API_URL}/menu/categories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (data.success) {
                    nameInput.value = '';
                    await loadCategories();
                    showToast('Kategori eklendi!');
                    enableAllInputs();
                    nameInput.focus();
                } else {
                    showToast(data.error || 'Kategori eklenemedi', 'error');
                }
            } catch (error) {
                console.error('Kategori eklenemedi:', error);
                showToast('Bağlantı hatası.', 'error');
            } finally {
                enableAllInputs();
            }
        }

        // Kategorileri yükle
        async function loadCategories() {
            try {
                const response = await authFetch(`${API_URL}/menu/categories`);
                const data = await response.json();
                
                if (data.success) {
                    categories = data.data;
                    renderCategorySelect();
                    renderCategoriesList();
                }
            } catch (error) {
                console.error('Kategoriler yüklenemedi:', error);
            }
        }

        // Kategori select'i render et
        function renderCategorySelect() {
            const options = categories.length
                ? categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('')
                : '<option value="">Kategori yok</option>';
            const select = document.getElementById('productCategory');
            if (select) select.innerHTML = options;
        }

        function renderCategoriesList() {
            const el = document.getElementById('categoriesList');
            if (!el) return;
            if (!categories.length) {
                el.innerHTML = '<span style="color:#718096">Kategori yok</span>';
                return;
            }
            el.innerHTML = categories.map(c => `
                <span class="category-tag" style="display:inline-flex;align-items:center;gap:6px;">
                    ${c.name}
                    <button type="button" class="action-btn btn-delete" style="padding:2px 8px;" onclick="deleteCategory(${c.id})">Sil</button>
                </span>
            `).join('');
        }

        async function deleteCategory(categoryId) {
            if (!confirm('Bu kategoriyi silmek istediginize emin misiniz?')) return;
            try {
                const res = await authFetch(`${API_URL}/menu/categories/${categoryId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showToast('Kategori silindi');
                    resetDataLoaded();
                    await init();
                } else {
                    showToast(data.error || 'Silinemedi', 'error');
                }
            } catch (e) {
                showToast('Baglanti hatasi', 'error');
            }
        }

        // Ürünleri yükle
        async function loadProducts() {
            try {
                const response = await authFetch(`${API_URL}/menu/products`);
                const data = await response.json();
                
                if (data.success) {
                    products = data.data;
                    renderProducts();
                }
            } catch (error) {
                console.error('Ürünler yüklenemedi:', error);
            }
        }

        function filterProducts() {
            productSearchTerm = (document.getElementById('productSearch')?.value || '').toLowerCase().trim();
            renderProducts();
        }

        // Ürünleri render et
        function renderProducts() {
            const tbody = document.getElementById('productsTableBody');
            const filtered = productSearchTerm
                ? products.filter(p => 
                    (p.name || '').toLowerCase().includes(productSearchTerm) ||
                    (p.category_name || '').toLowerCase().includes(productSearchTerm))
                : products;
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">' + 
                    (productSearchTerm ? 'Arama sonucu bulunamadı' : 'Ürün bulunmuyor') + '</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(product => `
                <tr>
                    <td><strong>${product.name}</strong></td>
                    <td><span class="category-tag">${product.category_name || 'Kategorisiz'}</span></td>
                    <td><strong>${formatPrice(product.price)}</strong></td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editProduct('${product.id}')">✏️ Düzenle</button>
                        <button class="action-btn btn-delete" onclick="deleteProduct(${product.id})">🗑️ Sil</button>
                    </td>
                </tr>
            `).join('');
        }

        // Yeni ürün ekle
        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const categoryId = document.getElementById('productCategory').value;

            if (!name) {
                showToast('Ürün adı gerekli!', 'error');
                return;
            }
            if (isNaN(price) || price < 0) {
                showToast('Geçerli bir fiyat giriniz!', 'error');
                return;
            }
            if (!categoryId) {
                showToast('Kategori seçiniz!', 'error');
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        price: price,
                        category_id: parseInt(categoryId, 10)
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Ürün eklendi!');
                    document.getElementById('productName').value = '';
                    document.getElementById('productPrice').value = '';
                    await loadProducts();
                    enableAllInputs();
                } else {
                    showToast(data.error || 'Ürün eklenemedi', 'error');
                }
            } catch (error) {
                console.error('Ürün eklenemedi:', error);
                showToast('Bağlantı hatası.', 'error');
            } finally {
                enableAllInputs();
            }
        }

        let editingProductId = null;

        function openEditModal(productId) {
            const product = products.find(p => String(p.id) === String(productId));
            if (!product) {
                showToast('Ürün bulunamadı.', 'error');
                return;
            }
            editingProductId = product.id;
            document.getElementById('editProductName').value = product.name || '';
            document.getElementById('editProductPrice').value = product.price ?? '';
            const catSelect = document.getElementById('editProductCategory');
            catSelect.innerHTML = categories.map(c => 
                `<option value="${c.id}" ${c.id === product.category_id ? 'selected' : ''}>${c.name}</option>`
            ).join('');
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingProductId = null;
            enableAllInputs();
        }

        async function saveEditedProduct() {
            if (!editingProductId) return;
            const name = document.getElementById('editProductName').value.trim();
            const price = parseFloat(document.getElementById('editProductPrice').value);
            const categoryId = document.getElementById('editProductCategory').value;

            if (!name) {
                showToast('Ürün adı gerekli!', 'error');
                return;
            }
            if (isNaN(price) || price < 0) {
                showToast('Geçerli bir fiyat giriniz!', 'error');
                return;
            }
            if (!categoryId) {
                showToast('Kategori seçiniz!', 'error');
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        price: price,
                        category_id: parseInt(categoryId, 10)
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Ürün güncellendi!');
                    closeEditModal();
                    await loadProducts();
                } else {
                    showToast(data.error || 'Ürün güncellenemedi', 'error');
                }
            } catch (error) {
                console.error('Ürün güncellenemedi:', error);
                showToast('Bağlantı hatası.', 'error');
            } finally {
                enableAllInputs();
            }
        }

        function editProduct(productId) {
            openEditModal(productId);
        }

        // Ürün sil
        async function deleteProduct(productId) {
            if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) {
                return;
            }

            try {
                const response = await authFetch(`${API_URL}/menu/products/${productId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Ürün silindi!');
                    await loadProducts();
                }
            } catch (error) {
                console.error('Ürün silinemedi:', error);
                showToast('Ürün silinemedi.', 'error');
            } finally {
                enableAllInputs();
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
